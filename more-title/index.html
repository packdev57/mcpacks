<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模組商店 - 更多標題</title>
    <style>
        :root {
            --primary-color: #388e3c;
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            width: 90%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 2rem;
        }

        .module-icon {
            width: 120px;
            height: 120px;
            background: #333;
            margin: 0 auto 1.5rem;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid var(--primary-color);
            overflow: hidden; /* 新增：確保圖片不會超出圓角邊框 */
        }

        /* 新增：設定圖片大小與填滿方式 */
        .module-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 讓圖片按比例填滿，不會被拉伸變形 */
        }

        .version-selector {
            margin-bottom: 2rem;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            background: #2c2c2c;
            color: white;
            border: 1px solid #444;
            font-size: 1rem;
            cursor: pointer;
            outline: none;
        }

        select:focus {
            border-color: var(--primary-color);
        }

        .download-btn {
            display: inline-block;
            width: 100%;
            padding: 15px;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            font-weight: bold;
            border-radius: 8px;
            transition: transform 0.2s, background 0.2s;
            cursor: pointer;
            border: none;
            font-size: 1.1rem;
            box-sizing: border-box; /* 確保 padding 不會讓按鈕超出父容器 */
        }

        .download-btn:hover {
            background-color: #45a049;
            transform: translateY(-2px);
        }

        .download-btn:active {
            transform: translateY(0);
        }

        .info-tag {
            display: inline-block;
            margin-top: 1rem;
            font-size: 0.8rem;
            padding: 4px 10px;
            background: #333;
            border-radius: 5px;
            color: #aaa;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="module-icon">
        <img src="moretitle_icon.png" alt=圖示[%00001@more-title]>
    </div>
    
    <h1>更多標題</h1>
    <p class="subtitle">By �Timfish0220�❏Admin❏</p>

    <div class="version-selector">
        <label for="version">選擇版本：</label>
        <select id="version" onchange="updateDownloadLink()">
            <option value="More_Titlev1.0.6.mcpack">1.0.6[最新版本]</option>
            <option value="More_Titlev1.0.5.mcpack">1.0.5</option>
            <option value="More_Titlev1.0.4.mcpack">1.0.4</option>
            <option value="More_Titlev1.0.3.mcpack">1.0.3</option>
            <option value="More_Titlev1.0.2.mcpack">1.0.2</option>
            <option value="Package 43v1-test.mcpack">1.0.1</option>
        </select>
    </div>

    <a id="downloadLink" href="Package 43v4.mcpack" download class="download-btn">
        安裝模組
    </a>

    <div class="info-tag" id="fileNameDisplay">
        <a href="https://packdev57.github.io/mcpack_histdt/%00001@moretitle" target="_blank" style="display:inline-block; padding:10px 20px; background:#007bff; color:white; text-decoration:none; border-radius:5px;">
  下載測試版/歷史檔案
        </a>
        
    </div>
</div>

<script>
    function updateDownloadLink() {
        const selector = document.getElementById('version');
        const link = document.getElementById('downloadLink');
        // const display = document.getElementById('fileNameDisplay'); // 如果不需要動態更改作者標籤，這行可以忽略
        
        const selectedFile = selector.value;
        
        // 修復：動態將下載按鈕的網址 (href) 更新為使用者在選單中選取的檔案
        link.href = selectedFile;
    }
</script>

</body>
</html>
